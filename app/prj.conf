CONFIG_APPLICATION_DEFINED_SYSCALL=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_CLIENT=n
CONFIG_VIERA_GATT_LOG_LEVEL=3         # 0..4 (err..dbg)

# Version string exposed to the app
CONFIG_VIERA_FW_VERSION="0.1.0"

# UF2 bootloader flag (0x57 is common for Adafruit UF2 on nice!nano)
CONFIG_VIERA_BOOT_GPREGRET_VALUE=0x57